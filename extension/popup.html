<!DOCTYPE html>
<html style="width: 320px; padding: 16px; font-family: system-ui, -apple-system, sans-serif;">
<head>
  <meta charset="UTF-8">
  <title>Chrome Control AMZ</title>
  <style>
    body { margin: 0; padding: 0; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 14px; margin: 0; color: #333; }
    .status-card {
      background: #f8f9fa; border-radius: 8px; padding: 12px;
      border-left: 4px solid #ccc; margin-bottom: 12px;
    }
    .status-card.connected { border-left-color: #22c55e; }
    .status-card.disconnected { border-left-color: #ef4444; }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .status-row:last-child { margin-bottom: 0; }
    .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 13px; color: #333; font-weight: 500; }
    .value.ok { color: #22c55e; }
    .value.err { color: #ef4444; }
    .indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .indicator.on { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
    .indicator.off { background: #ef4444; }
    .url-box {
      font-size: 11px; color: #555; word-break: break-all;
      background: #fff; padding: 8px; border-radius: 4px;
      border: 1px solid #e5e7eb; margin-bottom: 12px;
      max-height: 40px; overflow: hidden;
    }
    .actions { display: flex; gap: 8px; margin-bottom: 10px; }
    button {
      flex: 1; padding: 8px 12px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s;
    }
    button.primary { background: #2563eb; color: white; }
    button.primary:hover { background: #1d4ed8; }
    button.secondary { background: #e5e7eb; color: #374151; }
    button.secondary:hover { background: #d1d5db; }
    .log { font-size: 10px; color: #999; max-height: 80px; overflow-y: auto; margin-top: 8px; }
    .log div { padding: 1px 0; border-bottom: 1px solid #f3f4f6; }
    .footer { font-size: 10px; color: #aaa; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="icon">
    <h1>Chrome Control AMZ</h1>
  </div>

  <div class="status-card" id="statusCard">
    <div class="status-row">
      <span class="label">状态</span>
      <span class="value" id="statusText"><span class="indicator off"></span>加载中...</span>
    </div>
    <div class="status-row">
      <span class="label">端口</span>
      <span class="value" id="portText">—</span>
    </div>
    <div class="status-row">
      <span class="label">服务器</span>
      <span class="value" id="serverText">—</span>
    </div>
    <div class="status-row">
      <span class="label">重试</span>
      <span class="value" id="retryText">0</span>
    </div>
  </div>

  <div class="url-box" id="urlDisplay">当前标签页: 加载中...</div>

  <div class="actions">
    <button class="secondary" id="refreshBtn">🔄 刷新</button>
    <button class="primary" id="reconnectBtn">🔌 重连</button>
  </div>

  <div class="log" id="logBox"></div>
  <div class="footer">v1.1.0 · Chrome Control AMZ</div>

  <script>
    const logBox = document.getElementById("logBox");

    function addLog(msg) {
      const d = document.createElement("div");
      const t = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      d.textContent = `[${t}] ${msg}`;
      logBox.prepend(d);
      if (logBox.children.length > 15) logBox.lastChild.remove();
    }

    // 方案1: 从 chrome.storage 读状态（不依赖 service worker 活跃）
    async function readStatusFromStorage() {
      return new Promise(resolve => {
        chrome.storage.local.get(["relay_status"], (data) => {
          resolve(data.relay_status || { connected: false, ws_url: "", retry_count: 0 });
        });
      });
    }

    // 方案2: 尝试 sendMessage（service worker 可能活跃）
    async function readStatusFromSW() {
      return new Promise((resolve) => {
        const timeout = setTimeout(() => resolve(null), 1000);
        chrome.runtime.sendMessage({ type: "get_status" }, (resp) => {
          clearTimeout(timeout);
          if (chrome.runtime.lastError) {
            resolve(null);
          } else {
            resolve(resp);
          }
        });
      });
    }

    async function updateStatus() {
      try {
        // 先尝试 sendMessage，失败则从 storage 读
        let response = await readStatusFromSW();
        let source = "sw";
        if (!response) {
          response = await readStatusFromStorage();
          source = "storage";
        }

        const card = document.getElementById("statusCard");
        const statusText = document.getElementById("statusText");
        const portText = document.getElementById("portText");
        const serverText = document.getElementById("serverText");
        const retryText = document.getElementById("retryText");

        let port = "—", server = "—";
        if (response.ws_url) {
          try {
            const u = new URL(response.ws_url);
            port = u.port || "—";
            server = u.hostname + ":" + (u.port || "—");
          } catch {
            server = response.ws_url;
          }
        }

        portText.textContent = port;
        serverText.textContent = server;
        retryText.textContent = response.retry_count || 0;

        if (response.connected) {
          card.className = "status-card connected";
          statusText.innerHTML = '<span class="indicator on"></span>已连接 ✅';
        } else {
          card.className = "status-card disconnected";
          statusText.innerHTML = '<span class="indicator off"></span>未连接 ❌';
        }

        // 当前标签页
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        document.getElementById("urlDisplay").textContent = "当前标签页: " + (tab?.url || "无");

        addLog(`状态刷新 (${source}): ${response.connected ? "已连接" : "未连接"}`);
      } catch (e) {
        addLog("错误: " + e.message);
      }
    }

    // 刷新按钮
    document.getElementById("refreshBtn").addEventListener("click", () => {
      addLog("手动刷新...");
      updateStatus();
    });

    // 重连按钮
    document.getElementById("reconnectBtn").addEventListener("click", () => {
      addLog("发起重连...");
      chrome.runtime.sendMessage({ type: "reconnect" }, (resp) => {
        if (chrome.runtime.lastError) {
          addLog("⚠️ SW 未响应: " + chrome.runtime.lastError.message);
        } else {
          addLog("✅ 重连指令已发送");
        }
        setTimeout(updateStatus, 2000);
      });
    });

    // 监听 storage 变化（background 写入时实时更新）
    chrome.storage.onChanged.addListener((changes, area) => {
      if (area === "local" && changes.relay_status) {
        const s = changes.relay_status.newValue;
        addLog(`状态变化: ${s.connected ? "已连接" : "已断开"}`);
        updateStatus();
      }
    });

    // 初始化
    updateStatus();
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
